<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — Day View</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Google+Sans+Display:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  :root {
    --bg: #FFFBFE;
    --surface: #F7F2FA;
    --on-surface: #1C1B1F;
    --on-surface-muted: #79747E;
    --outline: #CAC4D0;
    --morning-container: #FFDBC8; --morning-on: #331200; --morning-primary: #8B4513;
    --afternoon-container: #D1E4FF; --afternoon-on: #001D36; --afternoon-primary: #0061A4;
    --evening-container: #EADDFF; --evening-on: #21005D; --evening-primary: #6750A4;
    --night-container: #C5C4F0; --night-on: #0A0A3B;
    --quick-color: #1B6B45; --quick-bg: #A8F2C8;
    --focused-color: #7B5800; --focused-bg: #FFDEA3;
    --deep-color: #4F378B; --deep-bg: #D0BCFF;
  }
  .dark {
    --bg: #1C1B1F; --surface: #211F26; --on-surface: #E6E1E5;
    --on-surface-muted: #938F99; --outline: #49454F;
    --morning-container: #6E2D00; --morning-on: #FFDBC8; --morning-primary: #FFB68D;
    --afternoon-container: #004880; --afternoon-on: #D1E4FF; --afternoon-primary: #9ECAFF;
    --evening-container: #4F378B; --evening-on: #EADDFF; --evening-primary: #D0BCFF;
    --night-container: #292855; --night-on: #E2E1FF;
    --quick-color: #8BD5A8; --quick-bg: #004D25;
    --focused-color: #EFBF48; --focused-bg: #5A4100;
    --deep-color: #D0BCFF; --deep-bg: #4F378B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Google Sans', system-ui, sans-serif; background: var(--bg); color: var(--on-surface); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s, color 0.3s; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; flex-shrink: 0; }
  .header-title { font-family: 'Google Sans Display', sans-serif; font-size: 20px; font-weight: 500; }
  .header-date { font-size: 11px; color: var(--on-surface-muted); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; }
  .btn { background: var(--surface); border: none; border-radius: 50px; padding: 7px 13px; font-family: 'Google Sans', sans-serif; font-size: 12px; color: var(--on-surface); cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.75; }

  .day-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 0 10px 80px; flex: 1; min-height: 0; }

  .block { border-radius: 22px; position: relative; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.18s cubic-bezier(0.2,0,0,1); }
  .block:not(.night):not(.expanded) { cursor: pointer; }
  .block:not(.night):not(.expanded):hover { transform: scale(1.012); }
  .block.morning   { background: var(--morning-container);   color: var(--morning-on); }
  .block.afternoon { background: var(--afternoon-container); color: var(--afternoon-on); }
  .block.evening   { background: var(--evening-container);   color: var(--evening-on); }
  .block.night     { background: var(--night-container);     color: var(--night-on); }

  .block-header { padding: 13px 14px 4px; flex-shrink: 0; position: relative; z-index: 2; pointer-events: none; }
  .block-time { font-size: 10px; opacity: 0.55; letter-spacing: 0.3px; }
  .block-name { font-family: 'Google Sans Display', sans-serif; font-size: 16px; font-weight: 500; }

  .cap-bar { height: 2px; margin: 0 14px 4px; border-radius: 2px; background: rgba(0,0,0,0.1); overflow: hidden; flex-shrink: 0; pointer-events: none; }
  .dark .cap-bar { background: rgba(255,255,255,0.1); }
  .cap-fill { height: 100%; border-radius: 2px; transition: width 0.5s cubic-bezier(0.34,1.2,0.64,1); }
  .morning .cap-fill   { background: var(--morning-primary); }
  .afternoon .cap-fill { background: var(--afternoon-primary); }
  .evening .cap-fill   { background: var(--evening-primary); }

  .canvas-wrap { flex: 1; position: relative; min-height: 0; }
  .canvas-wrap canvas { position: absolute; inset: 0; }

  /* SVG balloon layer */
  .balloon-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

  /* task list */
  .task-list { display: none; flex-direction: column; gap: 5px; flex: 1; overflow-y: auto; padding: 4px 10px 10px; }
  .task-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 10px; background: rgba(255,255,255,0.32); font-size: 12px; opacity: 0; transform: translateY(5px); transition: opacity 0.28s, transform 0.28s; }
  .dark .task-row { background: rgba(0,0,0,0.18); }
  .task-row.vis { opacity: 1; transform: translateY(0); }
  .tdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tdot.quick { background: var(--quick-color); }
  .tdot.focused { background: var(--focused-color); }
  .tdot.deep { background: var(--deep-color); }
  .tname { flex: 1; }
  .tbadge { font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 10px; }
  .tbadge.quick { background: var(--quick-bg); color: var(--quick-color); }
  .tbadge.focused { background: var(--focused-bg); color: var(--focused-color); }
  .tbadge.deep { background: var(--deep-bg); color: var(--deep-color); }

  .back-btn { display: none; font-size: 11px; opacity: 0.55; cursor: pointer; padding: 2px 14px 4px; align-items: center; gap: 3px; flex-shrink: 0; z-index: 3; position: relative; }
  .block.expanded .back-btn { display: flex; }
  .block.expanded .cap-bar { display: none; }
  .block.expanded .canvas-wrap { display: none; }
  .block.expanded .task-list { display: flex; }
  .block.expanded { cursor: default !important; }
  .block.expanded:hover { transform: none !important; }

  .night-label { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0.35; }

  /* FAB */
  .voice-fab { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 58px; height: 58px; border-radius: 50%; background: var(--evening-primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 16px rgba(0,0,0,0.22); transition: transform 0.2s; z-index: 100; }
  .voice-fab:hover { transform: translateX(-50%) scale(1.1); }
  .voice-fab.listening { background: #B3261E; animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 3px 16px rgba(179,38,30,0.3)}50%{box-shadow:0 3px 28px rgba(179,38,30,0.6)} }
  .mic-svg { fill: white; width: 22px; height: 22px; }

  /* ADD PANEL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .add-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--outline); border-radius: 22px 22px 0 0; padding: 18px 18px 32px; transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.2,0,0,1); z-index: 200; }
  .add-panel.open { transform: translateY(0); }
  .panel-title { font-size: 13px; color: var(--on-surface-muted); margin-bottom: 10px; }
  .panel-input { width: 100%; background: var(--surface); border: 1.5px solid var(--outline); border-radius: 12px; padding: 11px 14px; font-family: 'Google Sans', sans-serif; font-size: 14px; color: var(--on-surface); outline: none; margin-bottom: 10px; }
  .panel-input:focus { border-color: var(--evening-primary); }
  .row-label { font-size: 11px; color: var(--on-surface-muted); margin-bottom: 5px; }
  .pick-row { display: flex; gap: 7px; margin-bottom: 10px; }
  .pick-btn { flex: 1; border: 1.5px solid var(--outline); border-radius: 10px; padding: 8px 4px; background: transparent; font-family: 'Google Sans', sans-serif; font-size: 12px; color: var(--on-surface); cursor: pointer; text-align: center; transition: all 0.15s; }
  .pick-btn.sel.quick   { background: var(--quick-bg);   color: var(--quick-color);   border-color: var(--quick-color); }
  .pick-btn.sel.focused { background: var(--focused-bg); color: var(--focused-color); border-color: var(--focused-color); }
  .pick-btn.sel.deep    { background: var(--deep-bg);    color: var(--deep-color);    border-color: var(--deep-color); }
  .pick-btn.sel.b { font-weight: 500; border-color: var(--on-surface-muted); background: var(--surface); }
  .add-main { width: 100%; background: var(--evening-primary); color: white; border: none; border-radius: 12px; padding: 13px; font-family: 'Google Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .add-main:hover { opacity: 0.88; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Flow</div>
    <div class="header-date">воскресенье, 13 апреля</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="toggleTheme()">◑ тема</button>
    <button class="btn" onclick="openAdd()">+ задача</button>
  </div>
</div>

<div class="day-grid">
  <div class="block morning" id="b-morning" onclick="tryExpand('morning',event)">
    <div class="block-header"><div class="block-time">06:00 – 12:00</div><div class="block-name">Утро</div></div>
    <div class="back-btn" onclick="collapse('morning',event)">← назад</div>
    <div class="cap-bar"><div class="cap-fill" id="cf-morning" style="width:0%"></div></div>
    <div class="canvas-wrap" id="cw-morning">
      <svg class="balloon-layer" id="svg-morning"></svg>
    </div>
    <div class="task-list" id="tl-morning"></div>
  </div>
  <div class="block afternoon" id="b-afternoon" onclick="tryExpand('afternoon',event)">
    <div class="block-header"><div class="block-time">12:00 – 18:00</div><div class="block-name">День</div></div>
    <div class="back-btn" onclick="collapse('afternoon',event)">← назад</div>
    <div class="cap-bar"><div class="cap-fill" id="cf-afternoon" style="width:0%"></div></div>
    <div class="canvas-wrap" id="cw-afternoon">
      <svg class="balloon-layer" id="svg-afternoon"></svg>
    </div>
    <div class="task-list" id="tl-afternoon"></div>
  </div>
  <div class="block evening" id="b-evening" onclick="tryExpand('evening',event)">
    <div class="block-header"><div class="block-time">18:00 – 22:00</div><div class="block-name">Вечер</div></div>
    <div class="back-btn" onclick="collapse('evening',event)">← назад</div>
    <div class="cap-bar"><div class="cap-fill" id="cf-evening" style="width:0%"></div></div>
    <div class="canvas-wrap" id="cw-evening">
      <svg class="balloon-layer" id="svg-evening"></svg>
    </div>
    <div class="task-list" id="tl-evening"></div>
  </div>
  <div class="block night">
    <div class="block-header"><div class="block-time">22:00 – 06:00</div><div class="block-name">Ночь</div></div>
    <div class="night-label">только отдых</div>
  </div>
</div>

<button class="voice-fab" id="vfab" onclick="fakeVoice()">
  <svg class="mic-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
</button>

<div class="overlay" id="overlay" onclick="closeAdd()"></div>
<div class="add-panel" id="addPanel">
  <div class="panel-title">Добавить задачу</div>
  <input class="panel-input" type="text" id="taskInput" placeholder="Что нужно сделать?" onkeydown="if(event.key==='Enter')doAdd()" />
  <div class="row-label">Вес</div>
  <div class="pick-row" id="wrow">
    <button class="pick-btn quick sel" onclick="selW('quick',this)">⚡ Quick</button>
    <button class="pick-btn focused" onclick="selW('focused',this)">◎ Focused</button>
    <button class="pick-btn deep" onclick="selW('deep',this)">◉ Deep</button>
  </div>
  <div class="row-label">Блок</div>
  <div class="pick-row">
    <button class="pick-btn b sel" onclick="selB('morning',this)">Утро</button>
    <button class="pick-btn b" onclick="selB('afternoon',this)">День</button>
    <button class="pick-btn b" onclick="selB('evening',this)">Вечер</button>
  </div>
  <button class="add-main" onclick="doAdd()">Добавить</button>
</div>

<script>
const { Engine, Runner, Bodies, Body, Composite, Events, Vector } = Matter;

const BLOCKS = ['morning','afternoon','evening'];
const W_RADIUS = { quick: 13, focused: 20, deep: 29 };
const W_POINTS = { quick: 1, focused: 3, deep: 6 };
const MAX_PTS = 12;

// Balloon colors — fill has transparency for airy feel
const BALLOON = {
  light: {
    quick:   { fill: 'rgba(168,242,200,0.82)', stroke: '#1B6B45', shine: 'rgba(255,255,255,0.55)' },
    focused: { fill: 'rgba(255,222,163,0.82)', stroke: '#7B5800', shine: 'rgba(255,255,255,0.55)' },
    deep:    { fill: 'rgba(208,188,255,0.82)', stroke: '#4F378B', shine: 'rgba(255,255,255,0.55)' },
  },
  dark: {
    quick:   { fill: 'rgba(0,77,37,0.85)',   stroke: '#8BD5A8', shine: 'rgba(255,255,255,0.2)' },
    focused: { fill: 'rgba(90,65,0,0.85)',    stroke: '#EFBF48', shine: 'rgba(255,255,255,0.2)' },
    deep:    { fill: 'rgba(79,55,139,0.85)',  stroke: '#D0BCFF', shine: 'rgba(255,255,255,0.2)' },
  }
};

let isDark = false;
let selWeight = 'quick';
let selBlock = 'morning';
const tasks = { morning: [], afternoon: [], evening: [] };
const engines = {}, runners = {}, bodies = {}, svgEls = {}, rafIds = {};
const blockSizes = {};

function getColors(w) {
  return isDark ? BALLOON.dark[w] : BALLOON.light[w];
}

// ---- SVG balloon rendering ----
function makeBalloonSVG(id, cx, cy, rx, ry, weight) {
  const c = getColors(weight);
  const ns = 'http://www.w3.org/2000/svg';

  const g = document.createElementNS(ns, 'g');
  g.setAttribute('data-id', id);
  g.style.transition = 'opacity 0.3s';
  g.style.opacity = '0';

  // main ellipse
  const el = document.createElementNS(ns, 'ellipse');
  el.setAttribute('cx', cx); el.setAttribute('cy', cy);
  el.setAttribute('rx', rx); el.setAttribute('ry', ry);
  el.setAttribute('fill', c.fill);
  el.setAttribute('stroke', c.stroke);
  el.setAttribute('stroke-width', '1.2');
  g.appendChild(el);

  // shine highlight
  const shine = document.createElementNS(ns, 'ellipse');
  shine.setAttribute('cx', cx - rx * 0.28);
  shine.setAttribute('cy', cy - ry * 0.28);
  shine.setAttribute('rx', rx * 0.28);
  shine.setAttribute('ry', ry * 0.22);
  shine.setAttribute('fill', c.shine);
  g.appendChild(shine);

  setTimeout(() => { g.style.opacity = '1'; }, 30);
  return g;
}

function updateBalloonSVG(g, cx, cy, rx, ry, vx, vy) {
  const speed = Math.sqrt(vx*vx + vy*vy);
  // squash & stretch based on velocity
  const stretch = 1 + Math.min(speed * 0.012, 0.22);
  const squash  = 1 / stretch;
  const angle = speed > 0.5 ? Math.atan2(vy, vx) * 180 / Math.PI : 0;

  const els = g.children;
  // main ellipse
  els[0].setAttribute('cx', cx); els[0].setAttribute('cy', cy);
  els[0].setAttribute('rx', rx * squash); els[0].setAttribute('ry', ry * stretch);
  els[0].setAttribute('transform', `rotate(${angle},${cx},${cy})`);
  // shine
  els[1].setAttribute('cx', cx - rx * squash * 0.28);
  els[1].setAttribute('cy', cy - ry * stretch * 0.28);
  els[1].setAttribute('rx', rx * squash * 0.28);
  els[1].setAttribute('ry', ry * stretch * 0.22);
  els[1].setAttribute('transform', `rotate(${angle},${cx},${cy})`);

}

// ---- Physics ----
function initPhysics(block) {
  const wrap = document.getElementById('cw-' + block);
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  if (W < 10 || H < 10) return;
  blockSizes[block] = { W, H };

  // resize svg
  const svg = document.getElementById('svg-' + block);
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const engine = Engine.create({ gravity: { y: -0.25 } }); // NEGATIVE — balloons float UP
  engines[block] = engine;
  bodies[block] = [];
  svgEls[block] = {};

  const t = 40;
  const walls = [
    Bodies.rectangle(W/2, -t/2,   W+60, t, { isStatic:true }),   // ceiling
    Bodies.rectangle(W/2, H+t/2,  W+60, t, { isStatic:true }),   // floor
    Bodies.rectangle(-t/2, H/2,   t, H*3, { isStatic:true }),    // left
    Bodies.rectangle(W+t/2, H/2,  t, H*3, { isStatic:true }),    // right
  ];
  walls.forEach(w => { w.render = { visible: false }; });
  Composite.add(engine.world, walls);

  const runner = Runner.create();
  Runner.run(runner, engine);
  runners[block] = runner;

  // animation loop
  function loop() {
    rafIds[block] = requestAnimationFrame(loop);
    const svg = document.getElementById('svg-' + block);
    if (!svg) return;
    bodies[block].forEach(({ id, body, weight, baseR }) => {
      const g = svgEls[block][id];
      if (!g) return;
      // gentle random drift — makes them feel alive
      if (Math.random() < 0.04) {
        Body.applyForce(body, body.position, {
          x: (Math.random() - 0.5) * 0.0004,
          y: (Math.random() - 0.5) * 0.0003,
        });
      }
      const { x, y } = body.position;
      const { x: vx, y: vy } = body.velocity;
      updateBalloonSVG(g, x, y, baseR, baseR, vx, vy);
    });
  }
  loop();
}

function addBubble(block, weight) {
  const engine = engines[block];
  if (!engine) return;
  const { W, H } = blockSizes[block];
  const r = W_RADIUS[weight];
  const id = Date.now() + Math.random();

  const x = r * 2 + Math.random() * (W - r * 4);
  const y = H - r - 10; // start at bottom, float up

  const body = Bodies.circle(x, y, r, {
    restitution: 0.72,
    friction: 0.01,
    frictionAir: 0.008,
    density: 0.0004, // very light
  });
  // initial upward nudge
  Body.setVelocity(body, { x: (Math.random()-0.5)*1.5, y: -2.5 });
  Composite.add(engine.world, body);

  bodies[block].push({ id, body, weight, baseR: r });

  const svg = document.getElementById('svg-' + block);
  const g = makeBalloonSVG(id, x, y, r, r, weight);
  svg.appendChild(g);
  svgEls[block][id] = g;
}

function addTask(block, title, weight) {
  tasks[block].push({ title, weight });
  addBubble(block, weight);
  updateCap(block);
}

function updateCap(block) {
  const pts = tasks[block].reduce((s,t) => s + W_POINTS[t.weight], 0);
  document.getElementById('cf-' + block).style.width = Math.min(100, pts/MAX_PTS*100) + '%';
}

// ---- Expand / collapse ----
function tryExpand(block, e) {
  const el = document.getElementById('b-' + block);
  if (el.classList.contains('expanded')) return;
  el.classList.add('expanded');
  const list = document.getElementById('tl-' + block);
  list.innerHTML = '';
  if (!tasks[block].length) {
    const em = document.createElement('div');
    em.style.cssText = 'font-size:12px;opacity:0.4;padding:6px 0;';
    em.textContent = 'Задач нет';
    list.appendChild(em); return;
  }
  tasks[block].forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `<div class="tdot ${t.weight}"></div><span class="tname">${t.title}</span><span class="tbadge ${t.weight}">${t.weight}</span>`;
    list.appendChild(row);
    setTimeout(() => row.classList.add('vis'), 50 + i * 55);
  });
}

function collapse(block, e) {
  e.stopPropagation();
  document.getElementById('b-' + block).classList.remove('expanded');
}

// ---- UI ----
function selW(w, el) {
  selWeight = w;
  document.querySelectorAll('.pick-btn:not(.b)').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
}
function selB(b, el) {
  selBlock = b;
  document.querySelectorAll('.pick-btn.b').forEach(x => x.classList.remove('sel'));
  el.classList.add('sel');
}
function openAdd() {
  document.getElementById('addPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('taskInput').focus(), 340);
}
function closeAdd() {
  document.getElementById('addPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function doAdd() {
  const inp = document.getElementById('taskInput');
  const title = inp.value.trim();
  if (!title) return;
  addTask(selBlock, title, selWeight);
  inp.value = '';
  closeAdd();
}

const DEMOS = [
  { title: 'Написать отчёт', weight: 'deep', block: 'morning' },
  { title: 'Купить продукты', weight: 'quick', block: 'afternoon' },
  { title: 'Медитация', weight: 'quick', block: 'evening' },
  { title: 'Ревью дизайна', weight: 'focused', block: 'morning' },
  { title: 'Звонок клиенту', weight: 'focused', block: 'afternoon' },
  { title: 'Прогулка', weight: 'quick', block: 'evening' },
  { title: 'Стратегия Q2', weight: 'deep', block: 'morning' },
  { title: 'Yoga', weight: 'quick', block: 'morning' },
];
let voiceBusy = false;
function fakeVoice() {
  if (voiceBusy) return;
  voiceBusy = true;
  const fab = document.getElementById('vfab');
  fab.classList.add('listening');
  const d = DEMOS[Math.floor(Math.random() * DEMOS.length)];
  setTimeout(() => {
    addTask(d.block, d.title, d.weight);
    fab.classList.remove('listening');
    voiceBusy = false;
  }, 1500);
}

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
}

window.addEventListener('load', () => {
  BLOCKS.forEach(b => initPhysics(b));
  const initial = [
    { title: 'Написать стратегию', weight: 'deep',    block: 'morning' },
    { title: 'Ответить на письма', weight: 'focused',  block: 'morning' },
    { title: 'Проверить Slack',     weight: 'quick',   block: 'morning' },
    { title: 'Созвон с командой',  weight: 'focused',  block: 'afternoon' },
    { title: 'Ревью задач',         weight: 'quick',   block: 'afternoon' },
    { title: 'Читать книгу',        weight: 'focused',  block: 'evening' },
    { title: 'Прогулка',            weight: 'quick',   block: 'evening' },
  ];
  initial.forEach((t, i) => setTimeout(() => addTask(t.block, t.title, t.weight), 250 + i * 200));
});
</script>
</body>
</html>
